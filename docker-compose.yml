# ═══════════════════════════════════════════════════════════════
# Orquestração dos 3 serviços do sistema
# ═══════════════════════════════════════════════════════════════
# - int1: API REST (.NET 8) — porta 5018
# - int3: Frontend Blazor — porta 8080
# - worker: serviço de background (polling do T50M)
#
# Todos compartilham o mesmo arquivo banco.db via volume `db-data`.
# Subir tudo:    docker compose up -d --build
# Derrubar:     docker compose down
# Logs ao vivo: docker compose logs -f
# ═══════════════════════════════════════════════════════════════

services:
  int1:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: cta-int1-api
    ports:
      - "5018:5018"
    volumes:
      - db-data:/data
      # Gravações das câmeras — montadas em CAMERA_BASE_PATH dentro do container.
      - camera-recordings:/var/cameras
    environment:
      - DB_PATH=/data/banco.db
      - ASPNETCORE_ENVIRONMENT=Production
      # Sobrescreve as chaves do appsettings.json. Em prod, troque por valores fortes.
      - Jwt__Key=chave-secreta-minimo-32-caracteres-5cta
      - AesKey=5cta-aes-key-senha-segura-32char
      # SMTP — usado pelo reenvio de credenciais (PersonController.cs).
      # Lidos do .env ao lado do compose. Sem eles, o envio cai no fallback console.
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      # Câmera — onde gravações são escritas e qual o binário do ffmpeg.
      # ffmpeg é instalado na imagem (ver docker/Dockerfile.api), então o path
      # padrão "ffmpeg" funciona dentro do container.
      - CAMERA_BASE_PATH=/var/cameras
      - FFMPEG_PATH=ffmpeg
    healthcheck:
      # Verifica se a API ta respondendo antes do Frontend tentar conectar.
      # Usa a rota /swagger (existe em Dev) ou /hangfire — ambas retornam algo.
      test: ["CMD", "curl", "-fsS", "http://localhost:5018/hangfire/stats", "||", "exit", "1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  int3:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: cta-int3-frontend
    ports:
      - "8080:8080"
    volumes:
      - db-data:/data
    environment:
      - DB_PATH=/data/banco.db
      - BancoApiUrl=http://int1:5018/
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      int1:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: cta-worker
    volumes:
      - db-data:/data
      # Worker tambem aciona MonitorarNovoArquivo (EventProcessor) — precisa
      # ler o mesmo diretorio de gravacoes do int1.
      - camera-recordings:/var/cameras
    environment:
      - DB_PATH=/data/banco.db
      - DOTNET_ENVIRONMENT=Production
      - CAMERA_BASE_PATH=/var/cameras
      - FFMPEG_PATH=ffmpeg
      # T50M — IP/porta do terminal Anviz. Lidos do .env ao lado do compose.
      # Sem isso, usa default 192.168.0.218:5010.
      - T50M_IP=${T50M_IP:-192.168.0.218}
      - T50M_PORTA=${T50M_PORTA:-5010}
    depends_on:
      int1:
        condition: service_started
    restart: unless-stopped

# Volumes nomeados — persistem entre `down`/`up`. Pra apagar TUDO:
# docker compose down -v   (CUIDADO: zera banco e gravações)
volumes:
  db-data:
  camera-recordings:
